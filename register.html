<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Регистрация — Голос Города">
    <title>Регистрация — Голос Города</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/image.ico">
    <link rel="apple-touch-icon" href="images/image.ico">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="header__nav">
                <a href="./" class="header__logo">
                    <img src="images/logo.png" alt="Голос Города" class="header__logo-img">
                </a>
                <ul class="header__menu">
                    <li><a href="./" class="header__link">Главная</a></li>
                    <li><a href="ideas.html" class="header__link">Все идеи</a></li>
                    <li><a href="news.html" class="header__link">Новости</a></li>
                    <li><a href="results.html" class="header__link">Реализовано</a></li>
                    <li><a href="about.html" class="header__link">О портале</a></li>
                </ul>
                <div class="header__auth" id="header-auth">
                    <a href="login.html" class="button button--secondary">Войти</a>
                    <a href="register.html" class="button button--primary">Регистрация</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="auth-section">
        <div class="container container--narrow">
            <div class="auth-card">
                <div class="auth-card__header">
                    <h1 class="auth-card__title">Регистрация</h1>
                    <p class="auth-card__subtitle">Создайте аккаунт для участия в жизни города</p>
                </div>

                <form class="form" id="register-form">
                    <div class="form__group">
                        <label class="form__label" for="name">Имя <span class="form__required">*</span></label>
                        <input type="text" id="name" name="name" class="form__input" placeholder="Ваше имя" required
                            minlength="2">
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email <span class="form__required">*</span></label>
                        <input type="email" id="email" name="email" class="form__input" placeholder="example@email.com"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password">Пароль <span class="form__required">*</span></label>
                        <input type="password" id="password" name="password" class="form__input"
                            placeholder="Минимум 6 символов" required minlength="6">
                        <span class="form__hint">Минимум 6 символов</span>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password-confirm">Подтверждение пароля <span
                                class="form__required">*</span></label>
                        <input type="password" id="password-confirm" name="password-confirm" class="form__input"
                            placeholder="Повторите пароль" required minlength="6">
                    </div>

                    <div class="form__error" id="form-error" style="display: none;"></div>

                    <div class="form__actions">
                        <button type="submit" class="button button--primary button--large button--full"
                            id="submit-btn">Зарегистрироваться</button>
                    </div>
                </form>

                <div class="auth-card__footer">
                    <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__brand">
                    <img src="images/logo.png" alt="Голос Города" class="footer__logo">
                    <p class="footer__description">Платформа гражданских инициатив для жителей города</p>
                </div>
            </div>
            <div class="footer__bottom">
                <p>&copy; 2025 Голос Города</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>
    <script src="js/auth.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => initRegisterPage());</script>
</body>

</html>
